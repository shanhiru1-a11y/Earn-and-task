<script>
    // Points load karagannawa
    let points = localStorage.getItem('userPoints') ? parseInt(localStorage.getItem('userPoints')) : 0;
    
    // Initial display update
    window.onload = () => {
        const balanceElement = document.getElementById('balance');
        if (balanceElement) balanceElement.innerText = points.toLocaleString();
    };

    const tg = window.Telegram.WebApp;
    tg.expand();

    // User ID eka gannawa
    const userId = (tg.initDataUnsafe && tg.initDataUnsafe.user) ? tg.initDataUnsafe.user.id.toString() : "12345678";

    // AdController eka function ekak widiyata hadammu (safety ekata)
    function getAdController() {
        if (window.Adsgram) {
            return window.Adsgram.init({ 
                blockId: "26784", 
                debug: true // Test karala iwara unama meka false karanna
            });
        }
        return null;
    }

    async function showAd() {
        const AdController = getAdController();
        if (!AdController) {
            tg.showAlert("AdsGram script not loaded yet!");
            return;
        }

        try {
            // Loading status ekak pennana eka hodai
            const result = await AdController.show({ userId: userId });
            
            // Adsgram status check
            if (result && result.done) {
                updatePoints(100);
                tg.showAlert("Congrats! 100 Points added.");
            } else {
                tg.showAlert("You closed the ad early or it wasn't finished.");
            }
        } catch (e) { 
            console.error("AdsGram Error:", e);
            // Error messages wenas wenna puluwan (e.g. 'No ads', 'User closed')
            let errorMsg = "No ads available or network issue.";
            if (e.description) errorMsg = e.description;
            tg.showAlert("Notice: " + errorMsg); 
        }
    }

    function updatePoints(amount) {
        points += amount;
        const balanceElement = document.getElementById('balance');
        if (balanceElement) balanceElement.innerText = points.toLocaleString();
        localStorage.setItem('userPoints', points);
    }

    function claimDaily() {
        const last = localStorage.getItem('lastClaim');
        const today = new Date().toDateString();
        if (last === today) { 
            tg.showAlert("Already claimed today!"); 
        } else { 
            updatePoints(200); 
            localStorage.setItem('lastClaim', today); 
            tg.showAlert("200 Points added!"); 
        }
    }

    function toggleWithdraw() {
        const ui = document.getElementById('withdrawUI');
        if (ui) ui.style.display = ui.style.display === 'block' ? 'none' : 'block';
    }

    function submitWithdraw() {
        const addr = document.getElementById('walletAddr').value;
        if (points < 5000) { tg.showAlert("Minimum 5,000 points required!"); return; }
        if (!addr) { tg.showAlert("Enter Address!"); return; }

        const user = tg.initDataUnsafe.user || { first_name: "User", username: "N/A" };
        const msg = `💰 *New Withdraw Request*%0A👤: ${user.first_name}%0A🆔: @${user.username}%0A💵: 5,000 PTS%0A🏦: ${addr}`;
        
        // Bot API fetch call
        fetch(`https://api.telegram.org/bot7737330752:AAEY9oUOnYp4_KxH-Mofp0oW0eH6o7qO0-0/sendMessage?chat_id=8193830513&text=${msg}&parse_mode=Markdown`)
        .then(response => {
            if (response.ok) {
                tg.showAlert("Request sent successfully!");
                points -= 5000;
                updatePoints(0); // Update balance display
                toggleWithdraw();
            } else {
                tg.showAlert("Error sending request to bot.");
            }
        }).catch(err => {
            tg.showAlert("Submission failed. Check connection.");
        });
    }
</script>
