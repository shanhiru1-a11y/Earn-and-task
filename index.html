<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Earn Mini App</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; text-align: center; padding: 20px; }
        .card { background: #d35400; padding: 30px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #balance { font-size: 3.5em; font-weight: bold; color: #fff; }
        .btn { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 18px; cursor: pointer; margin-top: 10px; font-weight: bold; transition: 0.3s; }
        .btn:active { transform: scale(0.98); opacity: 0.8; }
        .btn-blue { background: #2980b9; }
        #withdrawUI { display: none; margin-top: 20px; background: #34495e; padding: 15px; border-radius: 10px; }
        input { width: 90%; padding: 12px; margin-bottom: 10px; border-radius: 5px; border: none; outline: none; color: black; }
        .status-msg { font-size: 14px; color: #2ecc71; margin-top: 10px; font-weight: bold; }
    </style>
    <script src="https://adsgram.ai/sdk/v1/ad-controller.js"></script>
</head>
<body>

    <div class="card">
        <p style="margin:0; letter-spacing: 2px;">YOUR BALANCE</p>
        <div id="balance">0</div>
        <p style="margin:0; letter-spacing: 2px;">POINTS</p>
    </div>

    <button class="btn" onclick="showAd()">📺 WATCH AD (+100)</button>
    <button class="btn" onclick="claimDaily()">🎁 DAILY REWARD (+200)</button>
    <button class="btn btn-blue" onclick="toggleWithdraw()">💰 WITHDRAW</button>

    <div id="withdrawUI">
        <input type="text" id="walletAddr" placeholder="Enter Wallet Address">
        <button class="btn" onclick="submitWithdraw()">SUBMIT REQUEST</button>
    </div>

    <div id="statusMsg" class="status-msg">Connecting to Ads...</div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let points = localStorage.getItem('userPoints') ? parseInt(localStorage.getItem('userPoints')) : 0;
        document.getElementById('balance').innerText = points.toLocaleString();

        let AdController = null;
        
        // 1. Adsgram Initialize Logic
        function initAds() {
            if (window.Adsgram) {
                AdController = window.Adsgram.init({ 
                    blockId: "26784", 
                    debug: true // Test mode එකේ තියෙන්නේ. වැඩ කරනවා නම් පස්සේ මේක false කරන්න.
                });
                document.getElementById('statusMsg').innerText = "✅ Ads Ready";
                console.log("Adsgram Initialized");
            } else {
                console.log("Retrying Adsgram init...");
                setTimeout(initAds, 1000);
            }
        }
        
        // Page එක load වුණ ගමන්ම init කරන්න
        window.onload = initAds;

        // 2. Watch Ad Function
        async function showAd() {
            const statusLabel = document.getElementById('statusMsg');
            
            if (!AdController) {
                statusLabel.innerText = "⏳ SDK not ready, retrying...";
                initAds();
                tg.showAlert("Adsgram is still loading... Please wait 2 seconds and try again.");
                return;
            }

            try {
                statusLabel.innerText = "⏳ Loading Ad...";
                const result = await AdController.show();
                
                if (result && result.done) {
                    points += 100;
                    updateUI();
                    tg.showAlert("Success! 100 Points added.");
                    statusLabel.innerText = "✅ Ads Ready";
                } else {
                    tg.showAlert("You skipped the ad. No points added.");
                    statusLabel.innerText = "✅ Ads Ready";
                }
            } catch (error) {
                console.error("Adsgram Error:", error);
                statusLabel.innerText = "❌ Error Loading Ad";
                
                if (error.error === "no_ads") {
                    tg.showAlert("No ads available right now. Try again later.");
                } else if (error.error === "not_filled") {
                    tg.showAlert("Ad not filled. Try again.");
                } else {
                    tg.showAlert("Check your connection or Block ID.");
                }
            }
        }

        function updateUI() {
            localStorage.setItem('userPoints', points);
            document.getElementById('balance').innerText = points.toLocaleString();
        }

        function claimDaily() {
            const last = localStorage.getItem('lastClaim');
            const today = new Date().toDateString();
            if (last === today) {
                tg.showAlert("Already claimed today!");
            } else {
                points += 200;
                localStorage.setItem('lastClaim', today);
                updateUI();
                tg.showAlert("200 Points added!");
            }
        }

        function toggleWithdraw() {
            const ui = document.getElementById('withdrawUI');
            ui.style.display = (ui.style.display === 'block') ? 'none' : 'block';
        }

        function submitWithdraw() {
            const addr = document.getElementById('walletAddr').value;
            if (points < 5000) { tg.showAlert("Need 5,000 points!"); return; }
            if (!addr) { tg.showAlert("Enter wallet address!"); return; }

            const user = tg.initDataUnsafe.user || { first_name: "User", username: "N/A" };
            const msg = `Withdrawal Request: ${user.first_name} (@${user.username}) - ${points} PTS - Addr: ${addr}`;
            
            fetch(`https://api.telegram.org/bot7737330752:AAEY9oUOnYp4_KxH-Mofp0oW0eH6o7qO0-0/sendMessage?chat_id=8193830513&text=${encodeURIComponent(msg)}`)
            .then(() => {
                tg.showAlert("Request Sent!");
                points = 0;
                updateUI();
                toggleWithdraw();
            })
            .catch(err => {
                tg.showAlert("Error sending request. Try again.");
            });
        }
    </script>
</body>
</html>
