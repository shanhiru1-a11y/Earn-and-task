<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Cash Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #1c1c1c; color: white; text-align: center; }
        .card { background: #2a2a2a; padding: 20px; border-radius: 15px; margin: 20px; }
        .points { font-size: 32px; color: #f1c40f; font-weight: bold; }
        .btn { background: #3498db; color: white; border: none; padding: 15px 30px; 
               border-radius: 10px; font-size: 18px; cursor: pointer; width: 80%; margin: 10px; }
        .task { background: #333; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Welcome!</h1>
    <div class="card">
        <p>Your Balance</p>
        <div class="points" id="balance">0</div>
        <p>Points</p>
    </div>

    <h3>Available Tasks</h3>
    <div class="task">
        <p>Watch a Video Ad</p>
        <button class="btn" onclick="addPoints(10)">Claim 10 Points</button>
    </div>
    <div class="task">
        <p>Follow our Telegram</p>
        <button class="btn" onclick="addPoints(50)">Claim 50 Points</button>
    </div>

    <script>
        let points = 0;
        function addPoints(p) {
            points += p;
            document.getElementById('balance').innerText = points;
            alert("Success! You earned " + p + " points.");
        }
        // Initialize Telegram WebApp
        window.Telegram.WebApp.ready();
    </script>
</body>
</html>
