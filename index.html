<script>
    let points = localStorage.getItem('userPoints') ? parseInt(localStorage.getItem('userPoints')) : 0;
    document.getElementById('balance').innerText = points.toLocaleString();
    
    const tg = window.Telegram.WebApp;
    tg.expand();

    // User ID eka gannawa ads load karanna kalin
    const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id.toString() : "unknown";

    // Block ID eka hariyata configure karamu
    const AdController = window.Adsgram.init({ 
        blockId: "26784", // Quote athule danna
        debug: false      
    });

    async function showAd() {
        try {
            // AdsGram ekata userId ekath ekka request eka yawanna
            const result = await AdController.show({ userId: userId });
            
            if (result.done) {
                updatePoints(100);
                tg.showAlert("Congrats! 100 Points added.");
            } else {
                tg.showAlert("Ad closed early. No points added.");
            }
        } catch (e) { 
            console.error("AdsGram Error:", e);
            tg.showAlert("Ads are currently loading or unavailable. Please try again in 5 seconds."); 
        }
    }

    // --- Anith functions tika oyaage code eke thiyena widiyatama danna ---
    function updatePoints(amount) {
        points += amount;
        document.getElementById('balance').innerText = points.toLocaleString();
        localStorage.setItem('userPoints', points);
    }
    // ... claims and withdraw functions ...
</script>
