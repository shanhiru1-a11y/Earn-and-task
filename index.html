<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Earn Mini App</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; text-align: center; padding: 20px; }
        .card { background: #d35400; padding: 30px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #balance { font-size: 3.5em; font-weight: bold; color: #fff; }
        .btn { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 18px; cursor: pointer; margin-top: 10px; font-weight: bold; transition: 0.3s; }
        .btn:active { transform: scale(0.98); opacity: 0.8; }
        .btn-blue { background: #2980b9; }
        #withdrawUI { display: none; margin-top: 20px; background: #34495e; padding: 15px; border-radius: 10px; }
        input { width: 90%; padding: 12px; margin-bottom: 10px; border-radius: 5px; border: none; outline: none; }
        .loading-text { font-size: 12px; color: #bdc3c7; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="card">
        <p style="margin:0; letter-spacing: 2px;">YOUR BALANCE</p>
        <div id="balance">0</div>
        <p style="margin:0; letter-spacing: 2px;">POINTS</p>
    </div>

    <button class="btn" onclick="showAd()">📺 WATCH AD (+100)</button>
    <button class="btn" onclick="claimDaily()">🎁 DAILY REWARD (+200)</button>
    <button class="btn btn-blue" onclick="toggleWithdraw()">💰 WITHDRAW</button>

    <div id="withdrawUI">
        <input type="text" id="walletAddr" placeholder="Enter Wallet Address">
        <button class="btn" onclick="submitWithdraw()">SUBMIT REQUEST</button>
    </div>

    <p class="loading-text" id="statusMsg">AdsGram Ready</p>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://adsgram.ai/js/adstg.js"></script>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let points = localStorage.getItem('userPoints') ? parseInt(localStorage.getItem('userPoints')) : 0;
        document.getElementById('balance').innerText = points.toLocaleString();

        // 1. Adsgram Initialize - App එක පටන් ගන්නකොටම මේක ලෝඩ් වෙනවා
        let AdController = null;
        
        function initAds() {
            if (window.Adsgram) {
                AdController = window.Adsgram.init({ blockId: "26784", debug: false });
                document.getElementById('statusMsg').innerText = "Ads Ready to Play";
            } else {
                setTimeout(initAds, 1000); // Script එක ලෝඩ් වෙනකම් තත්පරයක් ඉන්නවා
            }
        }
        initAds();

        async function showAd() {
            if (!AdController) {
                tg.showAlert("Adsgram is still loading... Please wait 5 seconds.");
                return;
            }

            try {
                // 2. ඇඩ් එක පෙන්වීම
                const result = await AdController.show();
                
                if (result && result.done) {
                    // ඇඩ් එක බලලා ඉවර වුණොත් විතරක් පොයින්ට්ස් දෙනවා
                    points += 100;
                    updateUI();
                    tg.showConfirm("Success! 100 Points added to your balance.");
                }
            } catch (e) {
                console.error(e);
                // ඇඩ් එකක් නැත්නම් හෝ අවුලක් නම් මේක වැටෙනවා
                tg.showAlert("Notice: No ads available right now. Please try again in a few minutes.");
            }
        }

        function updateUI() {
            localStorage.setItem('userPoints', points);
            document.getElementById('balance').innerText = points.toLocaleString();
        }

        function claimDaily() {
            const last = localStorage.getItem('lastClaim');
            const today = new Date().toDateString();
            if (last === today) {
                tg.showAlert("You have already claimed your reward for today!");
            } else {
                points += 200;
                localStorage.setItem('lastClaim', today);
                updateUI();
                tg.showAlert("Daily Reward of 200 Points added!");
            }
        }

        function toggleWithdraw() {
            const ui = document.getElementById('withdrawUI');
            ui.style.display = (ui.style.display === 'block') ? 'none' : 'block';
        }

        function submitWithdraw() {
            const addr = document.getElementById('walletAddr').value;
            if (points < 5000) { tg.showAlert("Minimum withdrawal is 5,000 points!"); return; }
            if (!addr) { tg.showAlert("Please enter your wallet address!"); return; }

            const user = tg.initDataUnsafe.user || { first_name: "User", username: "N/A" };
            const msg = `Withdrawal Request:\nUser: ${user.first_name} (@${user.username})\nPoints: ${points}\nAddress: ${addr}`;
            
            // ඔයාගේ බොට් එකට මැසේජ් එක යවනවා
            fetch(`https://api.telegram.org/bot7737330752:AAEY9oUOnYp4_KxH-Mofp0oW0eH6o7qO0-0/sendMessage?chat_id=8193830513&text=${encodeURIComponent(msg)}`)
            .then(() => {
                tg.showAlert("Withdrawal request sent successfully!");
                points = 0; // Request එක යැව්වම පොයින්ට්ස් 0 කරනවා (හෝ ඔයාට ඕන ගානක් අඩු කරන්න)
                updateUI();
                toggleWithdraw();
            })
            .catch(() => {
                tg.showAlert("Error sending request. Check your connection.");
            });
        }
    </script>
</body>
</html>
