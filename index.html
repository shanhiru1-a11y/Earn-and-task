// මේ function එකේ window.Adsgram වෙනුවට කෙලින්ම Adsgram දාලා බලන්න
function getAdController() {
    if (typeof Adsgram !== 'undefined') { // Check loading status
        return Adsgram.init({ 
            blockId: "26784", 
            debug: true // දැනට මේක true කරලා බලන්න
        });
    }
    return null;
}
