<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Earn - Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://app.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <style>
        :root { --primary: #00d2ff; --bg: #0a0a0a; --card: #161616; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding: 20px; user-select: none; }
        .balance-card { background: linear-gradient(145deg, #1e1e1e, #000); padding: 35px; border-radius: 30px; border: 1px solid #333; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .balance-label { font-size: 14px; opacity: 0.6; letter-spacing: 2px; text-transform: uppercase; }
        .points { font-size: 60px; color: var(--primary); font-weight: 800; margin: 10px 0; text-shadow: 0 0 20px rgba(0,210,255,0.3); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .task-card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .task-card:active { transform: scale(0.95); }
        .btn-main { background: var(--primary); color: #000; border: none; padding: 18px; border-radius: 18px; font-size: 18px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 5px 15px rgba(0,210,255,0.4); }
        .withdraw-section { margin-top: 30px; padding: 20px; background: rgba(255,255,255,0.03); border-radius: 20px; display: none; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #000; color: white; }
    </style>
</head>
<body>

    <div class="balance-card">
        <div class="balance-label">Current Balance</div>
        <div class="points" id="balance">0</div>
        <div style="color: var(--primary); font-weight: bold;">PTS</div>
    </div>

    <div class="grid">
        <div class="task-card" onclick="showAd()">
            <span style="font-size: 30px;">📺</span>
            <h4>Watch Ad</h4>
            <p style="font-size: 12px; color: #888;">+100 Points</p>
        </div>
        <div class="task-card" id="dailyBtn" onclick="claimDaily()">
            <span style="font-size: 30px;">🎁</span>
            <h4>Daily Gift</h4>
            <p style="font-size: 12px; color: #888;">+200 Points</p>
        </div>
    </div>

    <button class="btn-main" onclick="toggleWithdraw()">Withdraw Points</button>

    <div id="withdrawUI" class="withdraw-section">
        <h3>Withdraw Rewards</h3>
        <p style="font-size: 12px; color: #aaa;">Minimum: 5,000 Points</p>
        <input type="text" id="walletAddr" placeholder="Enter Binance ID or Ton Address">
        <button class="btn-main" style="background: #2ecc71;" onclick="submitWithdraw()">Submit Request</button>
    </div>

    <script>
        // Points Management
        let points = localStorage.getItem('userPoints') ? parseInt(localStorage.getItem('userPoints')) : 0;
        document.getElementById('balance').innerText = points.toLocaleString();

        // AdsGram Setup with your ID: 26784
        const AdController = window.Adsgram.init({ blockId: "26784" });

        async function showAd() {
            try {
                const result = await AdController.show();
                if (result.done) {
                    updatePoints(100);
                    alert("Success! 100 Points added.");
                }
            } catch (e) {
                alert("Ads are loading... try again in a moment.");
            }
        }

        function claimDaily() {
            const lastClaim = localStorage.getItem('lastDaily');
            const now = new Date().toDateString();

            if (lastClaim === now) {
                alert("You already claimed today! Come back tomorrow.");
            } else {
                updatePoints(200);
                localStorage.setItem('lastDaily', now);
                alert("Daily Bonus 200 Points added!");
            }
        }

        function updatePoints(amount) {
            points += amount;
            document.getElementById('balance').innerText = points.toLocaleString();
            localStorage.setItem('userPoints', points);
        }

        function toggleWithdraw() {
            const ui = document.getElementById('withdrawUI');
            ui.style.display = ui.style.display === 'block' ? 'none' : 'block';
        }

        function submitWithdraw() {
            const addr = document.getElementById('walletAddr').value;
            if (points < 5000) {
                alert("You need at least 5,000 points to withdraw.");
                return;
            }
            if (!addr) {
                alert("Please enter your wallet address.");
                return;
            }
            // මෙතනදී ඔයාට පුළුවන් යූසර්ගේ විස්තර ටෙලිග්‍රෑම් එකට එවන්න
            alert("Withdrawal Request Sent!\nAddress: " + addr + "\nWe will process it within 24h.");
            points -= 5000;
            updatePoints(0);
            toggleWithdraw();
        }

        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
